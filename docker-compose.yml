# HackAIthon Bảng C — Qwen3.5-4B MCQ (tiện ích để thí sinh TỰ TEST)
# Model + code đã nhúng trong image. Cách test:
#   1) Đặt private_test.json vào ./work
#   2) docker compose up
#   3) Lấy submission.csv + submission_time.csv trong ./work
#
# LƯU Ý QUAN TRỌNG:
#   - CHỈ mount RIÊNG file private_test.json vào /code (KHÔNG mount cả thư mục đè /code,
#     vì sẽ che mất predict.py/inference.sh/models/src đã COPY trong image).
#   - Output mặc định ghi vào /code; ở đây set OUT_DIR=/out (mount ./work) để lấy kết quả ra host.
#   - BTC chấm bằng: docker run -v <host>/private_test.json:/code/private_test.json <image>
#     rồi container tự chạy inference.sh -> predict.py.
services:
  solver:
    image: karuizawa/hackaithon-bangc:final
    environment:
      - OUT_DIR=/out
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./work/private_test.json:/code/private_test.json:ro   # mount RIÊNG file đề (không clobber code)
      - ./work:/out                                           # submission*.csv ghi ra đây
    restart: "no"
